name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify design contracts and dl-apply
        run: |
          bash -n scripts/dl-apply.sh scripts/dl-apply-registry.sh tests/*.sh
          bash tests/run.sh

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
        working-directory: starter

      - run: bun run build
        working-directory: starter
